services:
  db:
    image: postgres:16
    container_name: log-parser-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logs
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logs"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: log-parser-app
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/logs?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy